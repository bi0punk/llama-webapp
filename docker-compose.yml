services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped

  web:
    build: .
    restart: unless-stopped
    environment:
      DATA_DIR: /data
      DATABASE_URL: sqlite:////data/app.db
      HUGGING_FACE_TOKEN: ${HUGGING_FACE_TOKEN-}
      LLAMA_RUN_BIN: /opt/llama/bin/llama-run
      LLAMA_CLI_BIN: /opt/llama/bin/llama-cli
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./data:/data
    ports:
      - "8000:8000"
    depends_on:
      - redis

  worker:
    build: .
    restart: unless-stopped
    command: ["python", "/app/worker.py"]
    environment:
      DATA_DIR: /data
      DATABASE_URL: sqlite:////data/app.db
      HUGGING_FACE_TOKEN: ${HUGGING_FACE_TOKEN-}
      LLAMA_RUN_BIN: /opt/llama/bin/llama-run
      LLAMA_CLI_BIN: /opt/llama/bin/llama-cli
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./data:/data
    depends_on:
      - redis
