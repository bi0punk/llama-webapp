<div class="card">
  <div class="card-body">
    <div class="table-responsive">
      <table class="table table-sm align-middle">
        <thead>
          <tr>
            <th>ID</th>
            <th>Tipo</th>
            <th>Estado</th>
            <th>Progreso</th>
            <th>Mensaje</th>
            <th>Log</th>
          </tr>
        </thead>
        <tbody>
          {% for j in jobs %}
          <tr>
            <td class="mono">{{ j.id }}</td>
            <td class="mono">{{ j.type }}</td>
            <td>
              {% if j.status == "done" %}
                <span class="badge text-bg-success">done</span>
              {% elif j.status == "running" %}
                <span class="badge text-bg-warning">running</span>
              {% elif j.status == "error" %}
                <span class="badge text-bg-danger">error</span>
              {% else %}
                <span class="badge text-bg-secondary">{{ j.status }}</span>
              {% endif %}
            </td>
            <td style="min-width: 220px;">
              <div class="progress" role="progressbar" aria-valuenow="{{ j.progress }}" aria-valuemin="0" aria-valuemax="100">
                <div class="progress-bar" style="width: {{ j.progress }}%">{{ j.progress }}%</div>
              </div>
            </td>
            <td class="mono">{{ j.message or "" }}</td>
            <td><a class="btn btn-sm btn-outline-secondary" href="/jobs/{{ j.id }}/log" target="_blank">ver</a></td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</div>
