{% extends "base.html" %}
{% block content %}

<div class="row g-3">
  <div class="col-lg-4">
    <div class="card">
      <div class="card-body">
        <h5 class="card-title">Configuración</h5>

        <div class="mb-2">
          <label class="form-label">Modelo</label>
          <select id="model_id" class="form-select">
            {% for m in models %}
              <option value="{{ m.id }}" {% if m.status != "READY" %}disabled{% endif %}
                {% if request.query_params.get('model_id') and request.query_params.get('model_id')|int == m.id %}selected{% endif %}
              >
                [{{ m.status }}] {{ m.name }}
              </option>
            {% endfor %}
          </select>
          <div class="small-muted mt-1">Solo modelos en READY pueden ejecutarse.</div>
        </div>

        <div class="row g-2">
          <div class="col-4">
            <label class="form-label">Threads</label>
            <input id="threads" class="form-control" type="number" value="6" min="1" max="128">
          </div>
          <div class="col-4">
            <label class="form-label">Temp</label>
            <input id="temp" class="form-control" type="number" step="0.1" value="0.8" min="0" max="2">
          </div>
          <div class="col-4">
            <label class="form-label">Ctx</label>
            <input id="ctx" class="form-control" type="number" value="2048" min="256" max="32768">
          </div>
        </div>

        <hr />
        <div class="small-muted">llama-run: <span class="mono">{{ llama_run_bin }}</span></div>
        <div class="small-muted">Tip: si el modelo es grande, baja temp y sube ctx solo si tu RAM lo aguanta.</div>
      </div>
    </div>
  </div>

  <div class="col-lg-8">
    <div class="card mb-3">
      <div class="card-body">
        <h5 class="card-title">Chat (streaming)</h5>
        <div class="mb-2">
          <textarea id="prompt" class="form-control" rows="4" placeholder="Hola, ¿quién eres?"></textarea>
        </div>
        <div class="d-flex gap-2">
          <button id="send" class="btn btn-primary">Enviar</button>
          <button id="clear" class="btn btn-outline-secondary">Limpiar salida</button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-body">
        <h6 class="card-title">Salida</h6>
        <pre id="output" class="mono" style="min-height: 320px; max-height: 520px; overflow:auto;"></pre>
      </div>
    </div>
  </div>
</div>

<script src="/static/chat.js"></script>
{% endblock %}
