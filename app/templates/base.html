<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ title or "Llama Control Center" }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    body { background: #f5f7fb; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .small-muted { color: #6b7280; font-size: 0.92rem; }
    .card { border: 0; box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08); }
    pre { white-space: pre-wrap; word-break: break-word; }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg bg-dark navbar-dark mb-4">
  <div class="container-fluid">
    <a class="navbar-brand" href="/server">Llama Control Center</a>
    <div class="navbar-nav">
      <a class="nav-link" href="/server">Servidor</a>
      <a class="nav-link" href="/models">Modelos</a>
      <a class="nav-link" href="/jobs">Jobs</a>
      <a class="nav-link" href="/playground">Playground</a>
    </div>
  </div>
</nav>
<div class="container-fluid px-4 pb-4">
  {% block content %}{% endblock %}
</div>
</body>
</html>
